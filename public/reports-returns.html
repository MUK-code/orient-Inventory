<!DOCTYPE html>
<html>
<head>
  <title>Return Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
  <h2>Return Report</h2>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <input type="text" id="search" class="form-control d-inline-block me-2" style="width:260px;" placeholder="Search user, tag, brand...">
      <button id="exportPdf" class="btn btn-primary">Export PDF</button>
      <button id="exportCsv" class="btn btn-secondary">Export CSV</button>
    </div>
  </div>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>User</th>
        <th>Emp ID</th>
        <th>Department</th>
        <th>Asset</th>
        <th>Type</th>
        <th>Return Date</th>
        <th>Condition</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
let allData = [];
const searchInput = document.getElementById('search');
const exportPdf = document.getElementById('exportPdf');
const exportCsv = document.getElementById('exportCsv');

async function loadData(q=''){
  const url = q ? `/api/reports/returns?search=${encodeURIComponent(q)}` : '/api/reports/returns';
  const res = await fetch(url);
  const data = await res.json();
  allData = data;
  render(data);
}

function render(data){
  let html = '';
  data.forEach(row => {
    html += `
      <tr>
        <td>${escapeHtml(row.user)}</td>
        <td>${escapeHtml(row.employee_id)}</td>
        <td>${escapeHtml(row.department)}</td>
        <td>${escapeHtml(row.asset_tag)}</td>
        <td>${escapeHtml(row.type)}</td>
        <td>${escapeHtml(row.return_date)}</td>
        <td>${escapeHtml(row.condition_on_return)}</td>
      </tr>
    `;
  });
  document.getElementById('data').innerHTML = html;
}

function escapeHtml(s){ return (s||'').toString().replace(/[&<>'\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

searchInput.addEventListener('input', debounce(async () => { await loadData(searchInput.value.trim()); }, 250));

exportPdf.addEventListener('click', async () => {
  const q = searchInput.value.trim();
  const url = q ? `/api/reports/returns/pdf?search=${encodeURIComponent(q)}` : '/api/reports/returns/pdf';
  const res = await fetch(url);
  if (!res.ok) return alert('PDF generation failed');
  const blob = await res.blob();
  const urlBlob = window.URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = urlBlob; a.download = 'returns.pdf'; document.body.appendChild(a); a.click(); a.remove(); window.URL.revokeObjectURL(urlBlob);
});

exportCsv.addEventListener('click', () => {
  const q = searchInput.value.trim();
  const url = q ? `/api/reports/returns/csv?search=${encodeURIComponent(q)}` : '/api/reports/returns/csv';
  window.open(url, '_blank');
});

function debounce(fn, ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

// pre-fill search if query param provided
const params = new URLSearchParams(window.location.search);
if (params.get('search')) searchInput.value = params.get('search');

loadData(searchInput.value.trim());
</script>

</body>
</html>
