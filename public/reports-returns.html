<!DOCTYPE html>
<html>
<head>
  <title>Return Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
  <h2>Return Report</h2>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>User</th>
        <th>Emp ID</th>
        <th>Department</th>
        <th>Asset</th>
        <th>Type</th>
        <th>Return Date</th>
        <th>Condition</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<script>
fetch("/api/reports/returns")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(row => {
      html += `
        <tr>
          <td>${row.user}</td>
          <td>${row.employee_id}</td>
          <td>${row.department}</td>
          <td>${row.asset_tag}</td>
          <td>${row.type}</td>
          <td>${row.return_date}</td>
          <td>${row.condition_on_return}</td>
        </tr>
      `;
    });
    document.getElementById("data").innerHTML = html;
  });
</script>

</body>
</html>
